<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 120" width="440" height="120">
  <!-- PySirLabs Logo — Flask + Code (Dark) -->
  <g transform="translate(6, 30)">
    <!-- flask body -->
    <path d="M26 10 L26 26 L14 50 C12 54 15 58 20 58 L48 58 C53 58 56 54 54 50 L42 26 L42 10" stroke="#818cf8" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- flask rim -->
    <line x1="22" y1="10" x2="46" y2="10" stroke="#818cf8" stroke-width="3.5" stroke-linecap="round"/>
    <!-- liquid fill -->
    <path d="M17 48 L26 30 L42 30 L51 48 C52 51 51 54 48 54 L20 54 C17 54 16 51 17 48Z" fill="#818cf8" opacity="0.15"/>
    <!-- code brackets -->
    <path d="M26 36 L22 40.5 L26 45" stroke="#c7d2fe" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M42 36 L46 40.5 L42 45" stroke="#c7d2fe" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- forward slash -->
    <line x1="37" y1="35" x2="31" y2="46" stroke="#a5b4fc" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <!-- bubbles -->
    <circle cx="28" cy="52" r="1.8" fill="#a5b4fc" opacity="0.5"/>
    <circle cx="38" cy="50" r="1.3" fill="#c7d2fe" opacity="0.4"/>
  </g>
  <text x="80" y="76" font-family="Inter, -apple-system, system-ui, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="46" font-weight="700" letter-spacing="-1" fill="#f1f5f9">Py<tspan fill="#818cf8">Sir</tspan><tspan dx="4" fill="#94a3b8" font-weight="400">Labs</tspan></text>
</svg>
